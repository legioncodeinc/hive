name: CI

# The quality gate on every push to main and every PR into main for
# @legioncodeinc/hive. It runs the SAME recipe a developer runs locally
# (typecheck + test + build) so a green local gate predicts a green CI. This is
# the FIRST test CI hive has ever had; before this, the only automated gate
# was the release pipeline's own pre-publish checks, which never ran on PRs.
#
# WHY THREE OPERATING SYSTEMS: hive is a daemon with per-OS service units
# (src/service/ renders a launchd plist on macOS, a systemd user unit on Linux,
# and a Scheduled-Task definition on Windows) and per-platform path/argv logic.
# Running the FULL suite on ubuntu + macos + windows exercises that per-OS
# template and argv logic on each real OS, which a single-OS leg cannot. The
# dashboard (jsdom) and daemon (Hono) suites are OS-agnostic but cheap enough
# to run everywhere.
#
# WHAT THIS DOES NOT PROVE (explicitly out of CI scope): actually INSTALLING
# the OS service (launchctl load / systemctl --user enable / schtasks /Create),
# surviving a real reboot, or the daemon being restarted by the OS supervisor
# after a crash. Those need a privileged, reboot-capable host. This job
# verifies the cross-platform UNIT LOGIC and that the package builds and packs
# cleanly on each OS; nothing about live service lifecycle.
#
# Node is pinned to the package's engine floor (22.x). The cross-OS proof is
# the dimension that matters, so the matrix spends its axes on OS, not Node
# majors. `npm ci` installs only this package's dev deps from its own
# committed lockfile.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

# Cancel a superseded run on the same ref (a force-push or a new commit on a
# PR) so CI minutes are not spent on a stale commit.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: the gate only reads the repo and runs the build/test steps.
# No job here comments, pushes, or publishes.
permissions:
  contents: read

jobs:
  gate:
    name: hive gate (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      # persist-credentials: false so actions/checkout does not leave the
      # GITHUB_TOKEN in .git/config for later steps like npm ci to read
      # (zizmor artipacked hardening). This gate only reads the repo; it
      # never pushes.
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '22.x'
          cache: npm

      - name: Install (npm ci)
        run: npm ci

      # Discrete steps (not one aggregate script) so a failure points at the
      # exact gate stage. hive has no `npm run ci` aggregate; these are
      # its two real checks, mirroring the release pipeline's gate.
      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      # The build is `tsc && node esbuild.config.mjs`; both must run. Proves
      # the CLI bundles on each OS (the esbuild chmod step is a no-op on
      # win32 but exercised).
      - name: Build (tsc + esbuild bundles)
        run: npm run build

      # Packaging sanity: prove `npm pack` assembles the publishable tarball
      # (the `files: ["dist"]` allowlist plus package.json/README/LICENSE)
      # without error on each OS. `--dry-run` builds the tarball in memory
      # and prints its contents; nothing is written or uploaded. `prepack`
      # (= npm run build) reruns first, which is deliberate: it is the exact
      # path `npm publish` takes on release day.
      - name: Pack sanity (npm pack --dry-run)
        run: npm pack --dry-run
